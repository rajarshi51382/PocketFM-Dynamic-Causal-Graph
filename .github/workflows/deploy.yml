name: Deploy to Streamlit Cloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short --timeout=30
        env:
          PYTHONPATH: ${{ github.workspace }}/src
      
      - name: Lint check (optional)
        run: |
          pip install flake8
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
        continue-on-error: true

  # Streamlit Cloud auto-deploys from main branch
  # This job just verifies the app can start
  validate-app:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Validate Streamlit app syntax
        run: |
          python -c "import streamlit_app" 
        env:
          PYTHONPATH: ${{ github.workspace }}/src

  notify-deploy:
    runs-on: ubuntu-latest
    needs: [test, validate-app]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Deployment notification
        run: |
          echo "✅ All tests passed! Streamlit Cloud will auto-deploy from main branch."
          echo "🔗 App URL: https://causal-character-graphs.streamlit.app/"
